# Clients / NAS configuration
# Allow all Docker containers on the bridge network
client docker-net {
    ipaddr = 172.16.0.0/12
    secret = testing123
    shortname = docker-nas
    require_message_authenticator = no
}

# Also allow localhost for testing
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
    require_message_authenticator = no
}

client localhost-v6 {
    ipv6addr = ::1
    secret = testing123
    shortname = localhost-v6
}
